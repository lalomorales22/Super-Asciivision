services:
  - type: web
    # IMPORTANT: Change this name to something unique before deploying!
    # Render derives your public URL from it (e.g. my-relay.onrender.com).
    # Example: name: janes-asciivision-relay
    name: my-asciivision-relay
    runtime: node
    rootDir: hands-relay
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    buildFilter:
      paths:
        - hands-relay/**
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: HANDS_PUBLIC_BASE_URL
        sync: false
